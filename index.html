<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance App</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Error Catcher: Error iruntha red color-la screen-la kaattum -->
  <script>
    window.onerror = function(message) {
      document.getElementById('root').innerHTML = 
        '<div style="color:red; padding:40px; text-align:center; font-family:sans-serif;">' +
        '<h3>Oops! Oru Error Irukku:</h3><p>' + message + '</p>' +
        '<p style="color:gray; font-size:12px; mt-4">Screenshot eduthu anuppunga</p></div>';
    };
  </script>
</head>
<body class="bg-slate-50">
  
  <!-- App Load aagura varai intha text theriyum -->
  <div id="root">
    <div style="text-align:center; padding:100px; font-family:sans-serif; color:#4f46e5;">
      <i class="fas fa-spinner fa-spin" style="font-size:30px; margin-bottom:15px;"></i>
      <h2>Loading App... Please wait...</h2>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const USERS = [
      { id: 'u1', name: 'System Admin', role: 'ADMIN', email: 'admin@ams.edu' },
      { id: 'u2', name: 'Dr. Alan Smith', role: 'FACULTY', email: 'alan.s@ams.edu' },
      { id: 'u3', name: 'Prof. Sarah Jane', role: 'FACULTY', email: 'sarah.j@ams.edu' },
      { id: 'u4', name: 'Alice Johnson', role: 'STUDENT', email: 'alice.j@student.ams.edu' },
      { id: 'u5', name: 'Bob Williams', role: 'STUDENT', email: 'bob.w@student.ams.edu' },
    ];

    const SUBJECTS = [
      { id: 'sub1', code: 'CS101', name: 'Intro to Computer Science' },
      { id: 'sub2', code: 'MATH201', name: 'Advanced Calculus' },
    ];

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [sessions, setSessions] = useState([]);
      const [attendanceRecords, setAttendanceRecords] = useState([]);
      const [toast, setToast] = useState(null);

      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const handleLogin = (userId) => {
        const user = USERS.find(u => u.id === userId);
        setCurrentUser(user);
        showToast(`Welcome back, ${user.name}`, 'success');
      };

      const handleLogout = () => {
        setCurrentUser(null);
      };

      const createSession = (facultyId, subjectId, room) => {
        const newSession = {
          id: `sess_${Date.now()}`,
          facultyId,
          subjectId,
          room,
          createdAt: Date.now(),
          expiresAt: Date.now() + 5 * 60 * 1000,
          status: 'ACTIVE',
          qrToken: `QR_HMAC_${Math.random().toString(36).substring(2, 15)}`
        };
        setSessions(prev => [newSession, ...prev]);
        showToast('Attendance session started. QR code generated.', 'success');
        return newSession;
      };

      const closeSession = (sessionId) => {
        setSessions(prev => prev.map(s => 
          s.id === sessionId ? { ...s, status: 'CLOSED', expiresAt: Date.now() } : s
        ));
        showToast('Session closed manually.', 'info');
      };

      const markAttendance = (student, qrTokenScanned) => {
        const activeSession = sessions.find(s => s.qrToken === qrTokenScanned);
        if (!activeSession) {
          showToast('Invalid QR Code or Session Not Found.', 'error');
          return;
        }
        if (Date.now() > activeSession.expiresAt || activeSession.status !== 'ACTIVE') {
          showToast('QR Code has expired. Session closed.', 'error');
          return;
        }
        const alreadyMarked = attendanceRecords.find(
          a => a.sessionId === activeSession.id && a.studentId === student.id
        );
        if (alreadyMarked) {
          showToast('Attendance already marked for this session.', 'error');
          return;
        }
        const newRecord = {
          id: `att_${Date.now()}`,
          sessionId: activeSession.id,
          studentId: student.id,
          studentName: student.name,
          timestamp: Date.now(),
          status: 'PRESENT',
          deviceFingerprint: navigator.userAgent.substring(0, 50)
        };
        setAttendanceRecords(prev => [newRecord, ...prev]);
        showToast('Attendance marked successfully!', 'success');
      };

      if (!currentUser) {
        return <LoginScreen onLogin="{handleLogin}"/>;
      }

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row text-slate-800">
          <Sidebar onLogout="{handleLogout}" user="{currentUser}"/>
          <main className="flex-1 p-4 md:p-8 overflow-y-auto h-screen relative">
            <header className="mb-8 flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-bold text-slate-900">Dashboard</h1>
                <p className="text-sm text-slate-500">QR-Based Attendance Management</p>
              </div>
              <div className="hidden md:flex items-center space-x-3 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100">
                <i className="fas fa-user text-indigo-600 text-lg"></i>
                <span className="font-medium">{currentUser.name}</span>
                <span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full uppercase tracking-wider">
                  {currentUser.role}
                </span>
              </div>
            </header>

            {currentUser.role === 'ADMIN' && <AdminDashboard attendance="{attendanceRecords}" sessions="{sessions}"/>}
            {currentUser.role === 'FACULTY' && (
              <FacultyDashboard attendance="{attendanceRecords}" onCloseSession="{closeSession}" onCreateSession="{createSession}" sessions="{sessions}" user="{currentUser}"/>
            )}
            {currentUser.role === 'STUDENT' && (
              <StudentDashboard attendance="{attendanceRecords}" onScan="{markAttendance}" sessions="{sessions}" user="{currentUser}"/>
            )}

            {toast && (
              <div className={`fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-xl text-white flex items-center space-x-2 transition-all z-50 ${
                toast.type === 'success' ? 'bg-emerald-600' : toast.type === 'error' ? 'bg-red-600' : 'bg-slate-800'
              }`}>
                {toast.type === 'success' ? <i className="fas fa-check-circle"></i> : 
                 toast.type === 'error' ? <i className="fas fa-times-circle"></i> : <i className="fas fa-exclamation-triangle"></i>}
                <span>{toast.message}</span>
              </div>
            )}
          </main>
        </div>
      );
    }

    function Sidebar({ user, onLogout }) {
      return (
        <aside className="w-full md:w-64 bg-slate-900 text-slate-300 md:h-screen flex flex-col flex-shrink-0">
          <div className="p-4 md:p-6 border-b border-slate-800 flex items-center space-x-3">
            <i className="fas fa-qrcode text-indigo-400 text-3xl"></i>
            <span className="text-xl font-bold text-white tracking-tight">AMS<span className="text-indigo-400">QR</span></span>
          </div>
          <nav className="flex-1 p-4 space-y-2">
            <a href="#" className="flex items-center space-x-3 px-4 py-3 bg-indigo-600/10 text-indigo-400 rounded-lg font-medium">
              <i className="fas fa-columns text-lg"></i><span>Dashboard</span>
            </a>
          </nav>
          <div className="p-4 border-t border-slate-800">
            <button onClick={onLogout} className="w-full flex items-center justify-center space-x-2 px-4 py-2 bg-slate-800 hover:bg-red-500/10 hover:text-red-400 rounded-lg transition-colors">
              <i className="fas fa-sign-out-alt"></i><span>Sign Out</span>
            </button>
          </div>
        </aside>
      );
    }

    function LoginScreen({ onLogin }) {
      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
          <div className="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div className="bg-indigo-600 p-8 text-center text-white">
              <i className="fas fa-qrcode text-6xl mb-4 text-indigo-200"></i>
              <h1 className="text-2xl font-bold mb-1">AMS QR System</h1>
              <p className="text-indigo-200 text-sm">Secure Real-Time Attendance</p>
            </div>
            <div className="p-8">
              <h2 className="text-lg font-semibold text-slate-700 mb-4 text-center">Select Demo Identity</h2>
              <div className="space-y-3">
                {USERS.map(user => (
                  <button key={user.id} onClick={() => onLogin(user.id)} className="w-full flex items-center justify-between p-3 border border-slate-200 rounded-xl hover:border-indigo-600 hover:bg-indigo-50 text-left">
                    <div>
                      <div className="font-medium text-slate-800">{user.name}</div>
                      <div className="text-xs text-slate-500">{user.email}</div>
                    </div>
                    <span className={`text-xs px-2 py-1 rounded-md font-medium ${user.role === 'ADMIN' ? 'bg-red-100 text-red-700' : user.role === 'FACULTY' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}`}>
                      {user.role}
                    </span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function FacultyDashboard({ user, sessions, attendance, onCreateSession, onCloseSession }) {
      const [subject, setSubject] = useState(SUBJECTS[0].id);
      const [room, setRoom] = useState('Room 101');
      const [now, setNow] = useState(Date.now());

      useEffect(() => {
        const timer = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(timer);
      }, []);

      const activeSession = sessions.find(s => s.facultyId === user.id && s.status === 'ACTIVE' && s.expiresAt > now);
      const mySessions = sessions.filter(s => s.facultyId === user.id);
      
      const handleCreate = (e) => { e.preventDefault(); onCreateSession(user.id, subject, room); };
      const getRemainingTime = (expiresAt) => {
        const diff = Math.floor((expiresAt - now) / 1000);
        if (diff <= 0) return 'Expired';
        return `${Math.floor(diff / 60).toString().padStart(2, '0')}:${(diff % 60).toString().padStart(2, '0')}`;
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div className="lg:col-span-2 space-y-6">
            {!activeSession ? (
              <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <h2 className="text-lg font-bold mb-4 flex items-center"><i className="fas fa-play text-indigo-600 mr-2"></i> Start New Session</h2>
                <form onSubmit={handleCreate} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium mb-1">Subject</label>
                    <select value={subject} onChange={(e) => setSubject(e.target.value)} className="w-full border rounded-lg p-3 outline-none">
                      {SUBJECTS.map(s => <option key={s.id} value={s.id}>{s.code} - {s.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">Room No.</label>
                    <input type="text" value={room} onChange={(e) => setRoom(e.target.value)} className="w-full border rounded-lg p-3 outline-none" required />
                  </div>
                  <button type="submit" className="w-full bg-indigo-600 text-white p-3 rounded-lg font-medium">Generate QR Code</button>
                </form>
              </div>
            ) : (
              <div className="bg-white rounded-2xl p-6 shadow-xl border-2 border-indigo-500">
                <div className="flex flex-col md:flex-row gap-8 items-center justify-center p-4">
                  <div className="text-center">
                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${activeSession.qrToken}`} className="w-48 h-48 border-4 border-slate-100 rounded-xl" />
                  </div>
                  <div className="flex-1 text-center md:text-left space-y-4">
                    <h2 className="text-2xl font-bold">{SUBJECTS.find(s => s.id === activeSession.subjectId)?.name}</h2>
                    <p><i className="fas fa-clock text-amber-500"></i> Time Left: <span className="text-2xl font-bold text-amber-600">{getRemainingTime(activeSession.expiresAt)}</span></p>
                    <button onClick={() => onCloseSession(activeSession.id)} className="bg-slate-100 text-slate-700 px-6 py-2 rounded-lg mt-4">End Session</button>
                  </div>
                </div>
              </div>
            )}
            
            
            <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 overflow-x-auto">
              <h3 className="font-bold mb-4">Past Sessions</h3>
              <table className="w-full text-left text-sm">
                <thead className="bg-slate-50 text-slate-500">
                  <tr><th className="p-3">Date</th><th className="p-3">Subject</th><th className="p-3">Status</th></tr>
                </thead>
                <tbody>
                  {mySessions.map(s => (
                    <tr key={s.id} className="border-b"><td className="p-3">{new Date(s.createdAt).toLocaleDateString()}</td><td className="p-3">{SUBJECTS.find(sub => sub.id === s.subjectId)?.code}</td><td className="p-3">{s.status === 'ACTIVE' && s.expiresAt > now ? 'LIVE' : 'CLOSED'}</td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div className="bg-slate-900 rounded-2xl shadow-xl flex flex-col h-[600px] border border-slate-800">
            <div className="p-4 border-b border-slate-800"><h3 className="font-bold text-white"><i className="fas fa-users text-indigo-400 mr-2"></i> Live Roll Call</h3></div>
            <div className="p-4 flex-1 overflow-y-auto space-y-3">
              {activeSession ? (
                attendance.filter(a => a.sessionId === activeSession.id).length > 0 ? (
                  attendance.filter(a => a.sessionId === activeSession.id).map(record => (
                    <div key={record.id} className="bg-slate-800 rounded-xl p-3 flex justify-between text-white border border-slate-700">
                      <span>{record.studentName}</span><i className="fas fa-check-circle text-emerald-400"></i>
                    </div>
                  ))
                ) : (<p className="text-slate-500 text-center">Waiting for scans...</p>)
              ) : (<p className="text-slate-500 text-center">Start a session to see attendance.</p>)}
            </div>
          </div>
        </div>
      );
    }

    function StudentDashboard({ user, sessions, attendance, onScan }) {
      const [isScanning, setIsScanning] = useState(false);
      const handleSimulateScan = () => {
        setIsScanning(true);
        setTimeout(() => {
          setIsScanning(false);
          const activeSession = sessions.find(s => s.status === 'ACTIVE' && s.expiresAt > Date.now());
          if (activeSession) onScan(user, activeSession.qrToken);
          else onScan(user, 'INVALID_TOKEN'); 
        }, 1500);
      };
      const myRecords = attendance.filter(a => a.studentId === user.id);
      return (
        <div className="max-w-md mx-auto space-y-6">
          <div className="bg-white rounded-3xl p-6 shadow-xl border text-center">
            <i className="fas fa-mobile-alt text-4xl text-indigo-600 mb-4 bg-indigo-100 p-6 rounded-full"></i>
            <h2 className="text-xl font-bold mb-2">Scan Attendance</h2>
            <button onClick={handleSimulateScan} disabled={isScanning} className={`w-full py-4 mt-4 rounded-xl font-bold text-white shadow-lg ${isScanning ? 'bg-slate-400' : 'bg-indigo-600'}`}>
              {isScanning ? 'Scanning...' : 'Tap to Scan QR Code'}
            </button>
          </div>
          <div className="bg-white rounded-2xl p-6 border">
            <h3 className="font-bold mb-4"><i className="fas fa-clipboard-list text-indigo-500 mr-2"></i> Recent Scans</h3>
            {myRecords.map(record => (
              <div key={record.id} className="flex justify-between p-3 bg-slate-50 rounded-lg border mb-2">
                <span className="text-sm font-medium">{SUBJECTS.find(sub => sub.id === sessions.find(s => s.id === record.sessionId)?.subjectId)?.name}</span>
                <span className="text-emerald-600 text-xs font-bold">PRESENT</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function AdminDashboard({ sessions, attendance }) {
      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="bg-white p-6 rounded-2xl border shadow-sm"><div className="text-slate-500 text-sm">Total Sessions</div><div className="text-3xl font-bold">{sessions.length}</div></div>
            <div className="bg-white p-6 rounded-2xl border shadow-sm"><div className="text-slate-500 text-sm">Total Scans</div><div className="text-3xl font-bold text-indigo-600">{attendance.length}</div></div>
          </div>
          <div className="bg-white rounded-2xl border overflow-hidden">
            <div className="p-4 border-b bg-slate-50"><h3 className="font-bold">System Audit Log</h3></div>
            <table className="w-full text-left text-sm">
              <thead className="bg-slate-50 text-slate-500 border-b"><tr><th className="p-4">Time</th><th className="p-4">Event</th><th className="p-4">Entity</th></tr></thead>
              <tbody>
                {[...sessions, ...attendance].sort((a, b) => (b.createdAt || b.timestamp) - (a.createdAt || a.timestamp)).map(event => (
                  <tr key={event.id} className="border-b">
                    <td className="p-4 text-slate-500">{new Date(event.createdAt || event.timestamp).toLocaleString()}</td>
                    <td className="p-4">{event.facultyId ? <span className="text-indigo-600">SESSION_CREATED</span> : <span className="text-emerald-600">ATTENDANCE</span>}</td>
                    <td className="p-4">{event.facultyId ? `Faculty: ${event.facultyId}` : `Student: ${event.studentId}`}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
