      const [currentUser, setCurrentUser] = useState(null);
      const [sessions, setSessions] = useState([]);
      const [attendanceRecords, setAttendanceRecords] = useState([]);
      const [toast, setToast] = useState(null);

      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const handleLogin = (userId) => {
        const user = USERS.find(u => u.id === userId);
        setCurrentUser(user);
        showToast(`Welcome back, ${user.name}`, 'success');
      };

      const handleLogout = () => {
        setCurrentUser(null);
      };

      const createSession = (facultyId, subjectId, room) => {
        const newSession = {
          id: `sess_${Date.now()}`,
          facultyId,
          subjectId,
          room,
          createdAt: Date.now(),
          expiresAt: Date.now() + 5 * 60 * 1000, // 5 minute TTL
          status: 'ACTIVE',
          qrToken: `QR_HMAC_${Math.random().toString(36).substring(2, 15)}`
        };
        setSessions(prev => [newSession, ...prev]);
        showToast('Attendance session started. QR code generated.', 'success');
        return newSession;
      };

      const closeSession = (sessionId) => {
        setSessions(prev => prev.map(s => 
          s.id === sessionId ? { ...s, status: 'CLOSED', expiresAt: Date.now() } : s
        ));
        showToast('Session closed manually.', 'info');
      };

        // Validate session
        const activeSession = sessions.find(s => s.qrToken === qrTokenScanned);
        
        if (!activeSession) {
          showToast('Invalid QR Code or Session Not Found.', 'error');
          return;
        }
        
        if (Date.now() > activeSession.expiresAt || activeSession.status !== 'ACTIVE') {
          showToast('QR Code has expired. Session closed.', 'error');
          return;
        }

        // Check if already marked
        const alreadyMarked = attendanceRecords.find(
          a => a.sessionId === activeSession.id && a.studentId === student.id
        );

          showToast('Attendance already marked for this session.', 'error');
          return;
        }

          id: `att_${Date.now()}`,
          sessionId: activeSession.id,
          studentId: student.id,
          studentName: student.name,
          timestamp: Date.now(),
          status: 'PRESENT',
          deviceFingerprint: navigator.userAgent.substring(0, 50)
